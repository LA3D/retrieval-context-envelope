project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - appendix.qmd
  resources:
    - assets/**

website:
  title: "Retrieval as trajectory"
  description: "The context envelope framing for retrieval: why dense RAG breaks at scale, what a graph-based Markov retrieval looks like, and what it means to treat retrieval as a trajectory over a graph."
  site-url: https://la3d.github.io/retrieval-context-envelope
  repo-url: https://github.com/LA3D/retrieval-context-envelope
  repo-actions: [edit, issue]
  navbar:
    background: "#14213d"
    foreground: "#f8ecc9"
    left:
      - href: index.qmd
        text: Home
      - href: appendix.qmd
        text: Data appendix
    right:
      - icon: github
        href: https://github.com/LA3D/retrieval-context-envelope
        aria-label: GitHub
  page-footer:
    background: "#14213d"
    left: |
      &copy; 2026 Priscila Moreira, Charles Vardeman, James Sweet, Christopher R. Sweet
    center: |
      An educational site from the [LA3D](https://la3d.github.io) group at Notre Dame.
    right: |
      Built with [Quarto](https://quarto.org)

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

format:
  html:
    theme:
      light: [cosmo, styles.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    fig-cap-location: bottom
    include-in-header:
      - text: |
          <script>
          window.MathJax = { tex: { inlineMath: [['$','$'], ['\\(','\\)']] } };
          </script>
          <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
